<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications | Stock AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#020617;
    color:#e2e8f0;
    font-family:'Inter',sans-serif;
    min-height:100vh;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle at top,#0f172a,#020617),
               linear-gradient(-45deg,#020617,#0f172a,#020617);
    z-index:-2;
}
.nav{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(2,9,23,.95);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(56,189,248,.1);
    padding:0 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:62px;
    flex-wrap:wrap;
}
.nav-brand{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
}
.nav-brand i{color:#38bdf8;font-size:20px;}
.nav-brand span{font-size:18px;font-weight:800;background:linear-gradient(90deg,#38bdf8,#22d3ee);-webkit-background-clip:text;color:transparent;}
.nav-links{display:flex;gap:6px;flex-wrap:wrap;}
.nav-btn{
    display:flex;
    align-items:center;
    gap:6px;
    padding:7px 14px;
    border-radius:9px;
    border:1px solid rgba(255,255,255,.07);
    background:rgba(255,255,255,.04);
    color:#94a3b8;
    font-size:13px;
    font-weight:600;
    text-decoration:none;
    transition:.25s;
    cursor:pointer;
}
.nav-btn:hover{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);color:#38bdf8;}
.nav-user{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 14px;
    border-radius:50px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    font-size:13px;
    color:#94a3b8;
}
.udot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.container{max-width:1000px;margin:0 auto;padding:30px 22px;}

/* Header */
.notif-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}
.notif-header h1{
    font-size:24px;
    color:#38bdf8;
    display:flex;
    align-items:center;
    gap:10px;
}
.header-actions{
    display:flex;
    gap:10px;
}
.action-btn{
    background:rgba(56,189,248,.1);
    border:1px solid rgba(56,189,248,.2);
    border-radius:8px;
    padding:8px 16px;
    color:#38bdf8;
    font-size:13px;
    cursor:pointer;
    transition:.2s;
    display:flex;
    align-items:center;
    gap:6px;
}
.action-btn:hover{
    background:rgba(56,189,248,.2);
    transform:translateY(-1px);
}

/* Filter Bar */
.filter-bar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}
.filter-chip{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:6px 16px;
    font-size:12px;
    cursor:pointer;
    transition:.2s;
    color:#94a3b8;
}
.filter-chip.active{
    background:rgba(56,189,248,.15);
    border-color:#38bdf8;
    color:#38bdf8;
}
.filter-chip:hover{
    background:rgba(56,189,248,.1);
    border-color:#38bdf8;
}

/* Notifications List */
.notif-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}
.notif-item{
    background:rgba(15,23,42,.9);
    border:1px solid rgba(56,189,248,.1);
    border-radius:14px;
    padding:18px;
    transition:.3s;
    cursor:pointer;
    position:relative;
    display:flex;
    gap:15px;
    align-items:flex-start;
}
.notif-item:hover{
    border-color:rgba(56,189,248,.3);
    transform:translateX(4px);
}
.notif-item.unread{
    background:rgba(56,189,248,.05);
    border-left:3px solid #38bdf8;
}
.notif-icon{
    width:40px;
    height:40px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    flex-shrink:0;
}
.notif-icon.price_alert{background:rgba(251,191,36,.15);color:#fbbf24;}
.notif-icon.prediction{background:rgba(168,85,247,.15);color:#a855f7;}
.notif-icon.watchlist{background:rgba(34,197,94,.15);color:#22c55e;}
.notif-icon.trust_score{background:rgba(56,189,248,.15);color:#38bdf8;}
.notif-icon.news{background:rgba(239,68,68,.15);color:#ef4444;}
.notif-icon.system{background:rgba(100,116,139,.15);color:#94a3b8;}

.notif-content{
    flex:1;
}
.notif-title{
    font-size:15px;
    font-weight:600;
    margin-bottom:5px;
    color:#f1f5f9;
}
.notif-message{
    font-size:13px;
    color:#94a3b8;
    line-height:1.5;
    margin-bottom:6px;
}
.notif-time{
    font-size:11px;
    color:#64748b;
    font-family:monospace;
    display:flex;
    align-items:center;
    gap:5px;
}
.notif-actions{
    display:flex;
    gap:8px;
    align-items:center;
}
.notif-actions button{
    background:none;
    border:none;
    color:#64748b;
    cursor:pointer;
    font-size:14px;
    transition:.2s;
    padding:5px;
}
.notif-actions button:hover{color:#38bdf8;}

/* Empty State */
.empty-state{
    text-align:center;
    padding:60px 20px;
    color:#64748b;
}
.empty-state i{
    font-size:50px;
    margin-bottom:15px;
    opacity:0.5;
}
.empty-state p{font-size:14px;}

/* Loading */
.loader{
    text-align:center;
    padding:40px;
}
.spinner{
    width:40px;
    height:40px;
    border:3px solid rgba(56,189,248,.2);
    border-top-color:#38bdf8;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* News Sidebar / Modal - REAL NEWS PANEL */
.news-sidebar {
    position: fixed;
    top: 0;
    right: -500px;
    width: 500px;
    height: 100vh;
    background: #0f172a;
    border-left: 2px solid #38bdf8;
    z-index: 10001;
    transition: right 0.3s ease;
    box-shadow: -5px 0 30px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.news-sidebar.open {
    right: 0;
}
.news-sidebar-header {
    padding: 20px;
    background: #1e293b;
    border-bottom: 1px solid #38bdf8;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.news-sidebar-header h3 {
    color: #38bdf8;
    font-size: 18px;
}
.news-sidebar-header h3 i {
    margin-right: 8px;
}
.close-news {
    background: none;
    border: none;
    color: #94a3b8;
    font-size: 24px;
    cursor: pointer;
}
.close-news:hover {
    color: #ef4444;
}
.news-sidebar-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}
.news-article {
    background: #1e293b;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid #334155;
    transition: 0.2s;
}
.news-article:hover {
    border-color: #38bdf8;
}
.news-title {
    font-size: 15px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 8px;
    line-height: 1.4;
}
.news-summary {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 10px;
    line-height: 1.5;
}
.news-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #64748b;
}
.news-source {
    display: flex;
    align-items: center;
    gap: 6px;
}
.news-source i {
    font-size: 10px;
}
.news-time i {
    margin-right: 4px;
}
.read-more {
    background: rgba(56,189,248,0.15);
    border: 1px solid #38bdf8;
    padding: 4px 12px;
    border-radius: 20px;
    color: #38bdf8;
    font-size: 11px;
    text-decoration: none;
    transition: 0.2s;
}
.read-more:hover {
    background: #38bdf8;
    color: #020617;
}
.sentiment-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 500;
    margin-left: 8px;
}
.sentiment-positive { background: rgba(34,197,94,0.2); color: #22c55e; }
.sentiment-negative { background: rgba(239,68,68,0.2); color: #ef4444; }
.sentiment-neutral { background: rgba(100,116,139,0.2); color: #94a3b8; }
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 10000;
    display: none;
}
.overlay.active {
    display: block;
}
.toast-message {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10002;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    transition: 0.2s;
    opacity: 0;
    pointer-events: none;
}
.toast-success {
    background: rgba(34,197,94,0.9);
    color: white;
}
.toast-error {
    background: rgba(239,68,68,0.9);
    color: white;
}
@media(max-width:768px){
    .notif-item{flex-wrap:wrap;}
    .notif-actions{position:absolute;top:15px;right:15px;}
    .news-sidebar{width:100%;right:-100%;}
}
</style>
</head>
<body>

<nav class="nav">
    <a href="/dashboard" class="nav-brand">
        <i class="fa-solid fa-chart-line"></i>
        <span>Stock AI</span>
    </a>
    <div class="nav-links">
        <a href="/dashboard" class="nav-btn"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
        <a href="/stock" class="nav-btn"><i class="fa-solid fa-magnifying-glass-chart"></i><span>Predict</span></a>
        <a href="/trader" class="nav-btn"><i class="fa-solid fa-star"></i><span>Watchlist</span></a>
        <a href="/news" class="nav-btn" target="_blank"><i class="fa-solid fa-newspaper"></i><span>News</span></a>
        <a href="/trader" class="nav-btn"><i class="fa-solid fa-terminal"></i><span>Trader</span></a>
        <a href="/logout" class="nav-btn"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
    </div>
    <div class="nav-user"><span class="udot"></span><span id="usernameDisplay">{{ username }}</span></div>
</nav>

<div class="container">
    <div class="notif-header">
        <h1><i class="fa-regular fa-bell"></i> Notifications</h1>
        <div class="header-actions">
            <button class="action-btn" onclick="markAllRead()">
                <i class="fa-regular fa-circle-check"></i> Mark All Read
            </button>
            <button class="action-btn" onclick="deleteAllNotifications()" style="border-color: rgba(239,68,68,0.4); color: #f87171;">
                <i class="fa-regular fa-trash-alt"></i> Remove All
            </button>
            <button class="action-btn" onclick="loadNotifications()">
                <i class="fa-solid fa-rotate-right"></i> Refresh
            </button>
        </div>
    </div>

    <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" data-filter="all" onclick="filterNotifications('all')">All</button>
        <button class="filter-chip" data-filter="price_alert" onclick="filterNotifications('price_alert')">📈 Price Alerts</button>
        <button class="filter-chip" data-filter="prediction" onclick="filterNotifications('prediction')">🔮 Predictions</button>
        <button class="filter-chip" data-filter="watchlist" onclick="filterNotifications('watchlist')">⭐ Watchlist</button>
        <button class="filter-chip" data-filter="trust_score" onclick="filterNotifications('trust_score')">🎯 Trust Score</button>
        <button class="filter-chip" data-filter="news" onclick="filterNotifications('news')">📰 News</button>
    </div>

    <div id="notifContainer" class="notif-list">
        <div class="loader"><div class="spinner"></div></div>
    </div>
</div>

<!-- Real News Sidebar Panel -->
<div id="overlay" class="overlay" onclick="closeNewsSidebar()"></div>
<div id="newsSidebar" class="news-sidebar">
    <div class="news-sidebar-header">
        <h3><i class="fa-solid fa-newspaper"></i> Real-Time News</h3>
        <button class="close-news" onclick="closeNewsSidebar()">&times;</button>
    </div>
    <div id="newsSidebarContent" class="news-sidebar-content">
        <div style="text-align:center; padding:40px;">
            <i class="fa-solid fa-spinner fa-pulse"></i> Loading news...
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-message"></div>

<script>
// ========== NOTIFICATION FUNCTIONS (Backend API) ==========
let allNotifications = [];
let currentFilter = "all";

async function loadNotifications() {
    try {
        const response = await fetch('/api/notifications');
        const data = await response.json();
        allNotifications = data.notifications || [];
        renderNotifications();
        updateUnreadCount();
    } catch(e) {
        console.error('Error loading notifications:', e);
        document.getElementById('notifContainer').innerHTML = `
            <div class="empty-state">
                <i class="fa-regular fa-bell-slash"></i>
                <p>Failed to load notifications. Please try again.</p>
            </div>
        `;
    }
}

function renderNotifications() {
    const container = document.getElementById('notifContainer');
    let filtered = currentFilter === "all" ? allNotifications : allNotifications.filter(n => n.type === currentFilter);
    
    if(filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fa-regular fa-bell-slash"></i>
                <p>No notifications yet.<br>Check back later for updates!</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = filtered.map(notif => `
        <div class="notif-item ${notif.is_read ? '' : 'unread'}" data-id="${notif.id}" onclick="handleNotificationClick(${notif.id}, '${notif.type}', '${escapeHtml(notif.link_data || '')}')">
            <div class="notif-icon ${notif.type}">
                ${getIconForType(notif.type)}
            </div>
            <div class="notif-content">
                <div class="notif-title">${escapeHtml(notif.title)}</div>
                <div class="notif-message">${escapeHtml(notif.message)}</div>
                <div class="notif-time">
                    <i class="fa-regular fa-clock"></i> ${formatTime(notif.created_at)}
                </div>
            </div>
            <div class="notif-actions">
                ${!notif.is_read ? `<button onclick="event.stopPropagation(); markAsRead(${notif.id})" title="Mark as read"><i class="fa-regular fa-circle-check"></i></button>` : ''}
                <button onclick="event.stopPropagation(); deleteNotification(${notif.id})" title="Delete"><i class="fa-regular fa-trash-alt"></i></button>
            </div>
        </div>
    `).join('');
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function getIconForType(type) {
    const icons = {
        'price_alert': '<i class="fa-solid fa-chart-line"></i>',
        'prediction': '<i class="fa-solid fa-brain"></i>',
        'watchlist': '<i class="fa-solid fa-star"></i>',
        'trust_score': '<i class="fa-solid fa-chart-simple"></i>',
        'news': '<i class="fa-solid fa-newspaper"></i>',
        'system': '<i class="fa-solid fa-bell"></i>'
    };
    return icons[type] || '<i class="fa-solid fa-bell"></i>';
}

function formatTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    
    if(diffMins < 1) return 'Just now';
    if(diffMins < 60) return `${diffMins} minute${diffMins > 1 ? 's' : ''} ago`;
    if(diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
    if(diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
    return date.toLocaleDateString();
}

// ========== HANDLE NOTIFICATION CLICK - REAL NEWS REDIRECT ==========
async function handleNotificationClick(id, type, linkData) {
    // Mark as read first
    await markAsRead(id);
    
    if (type === 'news') {
        // Extract stock symbol from linkData or title
        let symbol = extractSymbolFromNotification(linkData, allNotifications.find(n => n.id === id));
        if (!symbol) {
            symbol = 'AAPL'; // Default
        }
        // Open real news page in new tab
        window.open(`/news?symbol=${symbol}`, '_blank');
    } 
    else if (type === 'price_alert') {
        let symbol = extractSymbol(linkData);
        if (symbol) {
            window.open(`/stock?symbol=${symbol}`, '_blank');
        } else {
            window.open('/stock', '_blank');
        }
    }
    else if (type === 'prediction') {
        window.open('/stock', '_blank');
    }
    else if (type === 'watchlist') {
        window.open('/trader', '_blank');
    }
    else if (type === 'trust_score') {
        window.open('/dashboard', '_blank');
    }
    else {
        window.open('/dashboard', '_blank');
    }
}

function extractSymbolFromNotification(linkData, notification) {
    if (linkData && linkData !== '') {
        try {
            let data = JSON.parse(linkData);
            return data.symbol || data.stock;
        } catch(e) {}
    }
    // Try to extract from title/message
    if (notification && notification.title) {
        let match = notification.title.match(/([A-Z]{1,5}\.?[A-Z]{0,2})/);
        if (match) return match[1];
    }
    return null;
}

function extractSymbol(linkData) {
    if (linkData && linkData !== '') {
        try {
            let data = JSON.parse(linkData);
            return data.symbol || data.stock;
        } catch(e) {}
    }
    return null;
}

// ========== API CALLS ==========
async function markAsRead(id) {
    try {
        await fetch('/api/notifications/mark-read', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ notification_id: id })
        });
        await loadNotifications();
    } catch(e) { console.error(e); }
}

async function markAllRead() {
    try {
        await fetch('/api/notifications/mark-all-read', { method: 'POST' });
        await loadNotifications();
        showToast("✅ All notifications marked as read", "success");
    } catch(e) { console.error(e); showToast("❌ Failed to mark all read", "error"); }
}

async function deleteNotification(id) {
    if(confirm('Delete this notification?')) {
        try {
            await fetch('/api/notifications/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notification_id: id })
            });
            await loadNotifications();
            showToast("🗑️ Notification deleted", "success");
        } catch(e) { console.error(e); showToast("❌ Delete failed", "error"); }
    }
}

async function deleteAllNotifications() {
    if(confirm('⚠️ Are you sure you want to delete ALL notifications? This action cannot be undone.')) {
        try {
            await fetch('/api/notifications/delete-all', { method: 'POST' });
            await loadNotifications();
            showToast("✅ All notifications cleared", "success");
        } catch(e) { console.error(e); showToast("❌ Failed to delete all", "error"); }
    }
}

function filterNotifications(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.classList.toggle('active', chip.dataset.filter === filter);
    });
    renderNotifications();
}

function refreshNotifications() {
    loadNotifications();
    showToast("🔄 Notifications refreshed", "success");
}

async function updateUnreadCount() {
    try {
        const response = await fetch('/api/notifications/unread-count');
        const data = await response.json();
        let badge = document.getElementById('unreadBadge');
        if (!badge) {
            const navUser = document.querySelector('.nav-user');
            if (navUser) {
                badge = document.createElement('span');
                badge.id = 'unreadBadge';
                badge.style.background = '#ef4444';
                badge.style.borderRadius = '30px';
                badge.style.padding = '2px 8px';
                badge.style.fontSize = '10px';
                badge.style.marginLeft = '8px';
                navUser.appendChild(badge);
            }
        }
        if (badge) {
            if (data.count > 0) {
                badge.textContent = data.count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }
    } catch(e) {}
}

function showToast(message, type) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = message;
    toast.className = `toast-message toast-${type === 'success' ? 'success' : 'error'}`;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 3000);
}

// ========== REAL NEWS SIDEBAR (for inline view) ==========
function openNewsSidebar(symbol) {
    const sidebar = document.getElementById('newsSidebar');
    const overlay = document.getElementById('overlay');
    const contentDiv = document.getElementById('newsSidebarContent');
    
    contentDiv.innerHTML = '<div style="text-align:center; padding:40px;"><i class="fa-solid fa-spinner fa-pulse"></i> Loading real news...</div>';
    sidebar.classList.add('open');
    overlay.classList.add('active');
    
    // Fetch real news from your backend API
    fetch(`/api/news/${symbol}`)
        .then(response => response.json())
        .then(data => {
            if (data.news && data.news.length > 0) {
                contentDiv.innerHTML = data.news.map(article => `
                    <div class="news-article">
                        <div class="news-title">
                            ${escapeHtml(article.title)}
                            <span class="sentiment-badge sentiment-${article.sentiment?.label || 'neutral'}">
                                ${article.sentiment?.emoji || '🟡'} ${article.sentiment?.label || 'Neutral'}
                            </span>
                        </div>
                        <div class="news-summary">${escapeHtml(article.summary || article.title)}</div>
                        <div class="news-meta">
                            <div class="news-source">
                                <i class="fa-regular fa-building"></i> ${escapeHtml(article.source || 'Yahoo Finance')}
                            </div>
                            <div class="news-time">
                                <i class="fa-regular fa-clock"></i> ${article.time || 'Recent'}
                            </div>
                            <a href="${article.url}" target="_blank" class="read-more">Read full story →</a>
                        </div>
                    </div>
                `).join('');
            } else {
                contentDiv.innerHTML = `<div style="text-align:center; padding:40px;">
                    <i class="fa-regular fa-newspaper"></i>
                    <p>No news found for ${symbol}. Try another symbol.</p>
                </div>`;
            }
        })
        .catch(error => {
            contentDiv.innerHTML = `<div style="text-align:center; padding:40px; color:#ef4444;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <p>Failed to load news. Please try again.</p>
            </div>`;
        });
}

function closeNewsSidebar() {
    document.getElementById('newsSidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}

// Load notifications on page load
loadNotifications();
setInterval(loadNotifications, 30000);
</script>
</body>
</html>
