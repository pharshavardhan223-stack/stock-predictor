<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Profile | Stock AI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ============ GLOBAL ============ */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(-45deg,#020617,#0f172a,#1e293b,#020617);
background-size:400% 400%;
animation:bgFlow 14s ease infinite;
color:#e5e7eb;
overflow:hidden;
}

/* Gradient Move */

@keyframes bgFlow{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Particles */

#bgCanvas{
position:fixed;
inset:0;
z-index:-1;
}

/* ============ CONTAINER ============ */

.container{
width:420px;
margin:80px auto;
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

/* ============ CARD ============ */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(18px);
border-radius:22px;
padding:35px 30px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 30px 70px rgba(0,0,0,.6);
position:relative;
overflow:hidden;
}

/* Shine */

.card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.08),
transparent
);
animation:shine 6s infinite;
pointer-events:none;
}

@keyframes shine{
to{transform:translateX(100%)}
}

/* Title */

.card h2{
text-align:center;
margin-bottom:25px;
font-weight:600;
background:linear-gradient(90deg,#38bdf8,#22d3ee,#7dd3fc);
-webkit-background-clip:text;
color:transparent;
}

/* ============ AVATAR UPLOAD ============ */

.avatar-wrap{
display:flex;
justify-content:center;
margin-bottom:25px;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
background:linear-gradient(45deg,#38bdf8,#22d3ee,#7dd3fc);
padding:4px;
animation:ring 6s linear infinite;
}

@keyframes ring{
to{transform:rotate(360deg)}
}

.avatar-inner{
width:100%;
height:100%;
border-radius:50%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:pointer;
}

.avatar-inner img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.avatar-inner i{
font-size:36px;
color:#38bdf8;
}

/* Hide file input */

input[type=file]{
display:none;
}

/* ============ FORM ============ */

.form-group{
margin-bottom:18px;
}

label{
font-size:13px;
color:#c7d2fe;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:11px 14px;
border-radius:10px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.05);
color:#e5e7eb;
outline:none;
transition:.3s;
}

input:focus{
border-color:#38bdf8;
box-shadow:0 0 0 3px rgba(56,189,248,.25);
}

/* ============ BUTTON ============ */

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#38bdf8,#22d3ee);
color:#020617;
font-weight:600;
cursor:pointer;
font-size:15px;
position:relative;
overflow:hidden;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #38bdf8;
}

/* Ripple */

button::after{
content:"";
position:absolute;
width:0;
height:0;
background:rgba(255,255,255,.4);
border-radius:50%;
transform:translate(-50%,-50%);
top:50%;
left:50%;
transition:.5s;
}

button:active::after{
width:300px;
height:300px;
opacity:0;
}

/* ============ BACK LINK ============ */

.back{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#7dd3fc;
transition:.3s;
}

.back:hover{
color:#22d3ee;
text-shadow:0 0 10px #22d3ee;
}

</style>
</head>

<body>

<!-- Background -->
<canvas id="bgCanvas"></canvas>

<div class="container">

<div class="card">

<h2>Edit Profile</h2>

<!-- Avatar -->

<div class="avatar-wrap">

<label class="avatar">

<div class="avatar-inner" id="avatarBox">

<i class="fa-solid fa-user"></i>

<img id="preview">

</div>

<input type="file" name="photo" id="photoInput" accept="image/*">

</label>

</div>


<form method="POST" enctype="multipart/form-data">

<div class="form-group">
<label>Name</label>
<input type="text" name="name" value="{{ username }}" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" value="{{ email }}" required>
</div>

<button type="submit">
Save Changes
</button>

</form>


<a href="/profile" class="back">
← Back to Profile
</a>

</div>

</div>


<!-- ============ SCRIPT ============ -->

<script>

/* Background Particles */

const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let dots=[];

for(let i=0;i<80;i++){
dots.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:(Math.random()-.5)*.5,
dy:(Math.random()-.5)*.5
});
}

function animateBG(){

ctx.clearRect(0,0,canvas.width,canvas.height);

dots.forEach(d=>{

d.x+=d.dx;
d.y+=d.dy;

if(d.x<0||d.x>canvas.width) d.dx*=-1;
if(d.y<0||d.y>canvas.height) d.dy*=-1;

ctx.fillStyle="rgba(56,189,248,.6)";
ctx.beginPath();
ctx.arc(d.x,d.y,1.8,0,Math.PI*2);
ctx.fill();

});

requestAnimationFrame(animateBG);
}

animateBG();


/* Image Preview */

const input=document.getElementById("photoInput");
const preview=document.getElementById("preview");
const icon=document.querySelector(".avatar-inner i");

input.addEventListener("change",()=>{

const file=input.files[0];

if(file){

const reader=new FileReader();

reader.onload=()=>{

preview.src=reader.result;
preview.style.display="block";
icon.style.display="none";

};

reader.readAsDataURL(file);

}

});

</script>

</body>
</html>
