<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Live Stock | Stock AI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
overflow:hidden;
}

/* Floating dots background */

body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle,#38bdf8 1px,transparent 1px);
background-size:45px 45px;
opacity:.05;
animation:bgFloat 40s linear infinite;
}

@keyframes bgFloat{
from{background-position:0 0}
to{background-position:600px 600px}
}

/* ================= CONTAINER ================= */

.container{
width:95%;
max-width:820px;
height:560px;
position:relative;
perspective:1200px;
animation:pageIn 1.2s ease;
}

@keyframes pageIn{
from{opacity:0;transform:scale(.9) translateY(40px)}
to{opacity:1;transform:scale(1) translateY(0)}
}

/* ================= CARD ================= */

.card{
height:100%;
background:#1e293b;
border-radius:30px;
padding:60px;
position:relative;
overflow:hidden;
transition:.4s ease;
box-shadow:0 30px 80px rgba(0,0,0,.6);
}

/* Moving light sweep */

.card::before{
content:"";
position:absolute;
top:0;
left:-150%;
width:150%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.08),
transparent
);
animation:lightMove 6s linear infinite;
}

@keyframes lightMove{
from{left:-150%}
to{left:150%}
}

/* Mouse glow */

.card::after{
content:"";
position:absolute;
width:200px;
height:200px;
background:radial-gradient(circle,
rgba(56,189,248,.25),
transparent 70%);
top:var(--y);
left:var(--x);
transform:translate(-50%,-50%);
pointer-events:none;
opacity:0;
transition:.2s;
}

.card:hover::after{
opacity:1;
}

/* 3D tilt */

.container:hover .card{
transform:rotateY(6deg) rotateX(5deg);
}

/* ================= HEADER ================= */

.header{
text-align:center;
margin-bottom:45px;
}

.header h2{
font-size:36px;
font-weight:700;
letter-spacing:1px;
}

.header p{
margin-top:10px;
color:#94a3b8;
font-size:15px;
}

/* ================= FORM ================= */

.form{
display:flex;
flex-direction:column;
gap:28px;
margin-top:40px;
}

/* Input */

.input-box{
position:relative;
}

.input-box input{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.05);
color:#e5e7eb;
outline:none;
font-size:15px;
transition:.3s;
}

.input-box input::placeholder{
color:#94a3b8;
}

.input-box input:focus{
border-color:#38bdf8;
box-shadow:0 0 0 4px rgba(56,189,248,.25);
}

/* Live Glow */

.input-box::after{
content:"";
position:absolute;
inset:0;
border-radius:14px;
box-shadow:0 0 30px rgba(56,189,248,.6);
opacity:0;
transition:.3s;
pointer-events:none;
}

.input-box:focus-within::after{
opacity:1;
}

/* ================= BUTTON ================= */

button{
margin-top:20px;
width:100%;
padding:18px;
border:none;
border-radius:30px;
font-size:18px;
font-weight:600;
cursor:pointer;
background:#38bdf8;
color:#0f172a;
transition:.3s;
position:relative;
overflow:hidden;
}

/* Wave effect */

button::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.6),
transparent
);
transition:.5s;
}

button:hover::after{
left:100%;
}

button:hover{
transform:translateY(-4px);
box-shadow:0 0 35px rgba(56,189,248,.9);
}

/* ================= MESSAGE ================= */

.msg{
text-align:center;
color:#fb7185;
font-size:14px;
margin-top:15px;
}

/* ================= FOOTER ================= */

.footer{
margin-top:45px;
display:flex;
justify-content:center;
gap:90px;
font-size:16px;
}

.footer a{
color:#7dd3fc;
text-decoration:none;
transition:.3s;
display:flex;
align-items:center;
gap:8px;
}

.footer a:hover{
color:#38bdf8;
text-shadow:0 0 12px #38bdf8;
}
/* AI LOADER */

.ai-loader{
position:fixed;
inset:0;
background:rgba(2,6,23,.97);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
opacity:0;
pointer-events:none;
transition:.4s ease;
}

.ai-loader.active{
opacity:1;
pointer-events:all;
}

.ai-core{
text-align:center;
color:#38bdf8;
}

.ring{
width:120px;
height:120px;
border:4px solid rgba(56,189,248,.2);
border-top:4px solid #38bdf8;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.scan{
width:140px;
height:4px;
background:linear-gradient(90deg,transparent,#38bdf8,transparent);
margin:15px auto;
animation:scanMove 1.2s linear infinite;
}

@keyframes scanMove{
to{transform:translateX(120px)}
}

.ai-core h3{
margin-top:15px;
font-size:22px;
}

.ai-core p{
font-size:14px;
color:#7dd3fc;
}
/* ===== LOGO LOADER ===== */

.logo-loader{
  position:relative;
  width:130px;
  height:130px;
  margin:auto;
}

/* Rotating Ring */

.logo-loader .ring{
  position:absolute;
  inset:0;
  border:4px solid rgba(56,189,248,.2);
  border-top:4px solid #38bdf8;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

/* Center Logo */

.loader-logo{
  position:absolute;
  width:70px;
  height:70px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  object-fit:cover;

  background:#020617;
  padding:6px;

  box-shadow:
    0 0 15px rgba(56,189,248,.6),
    0 0 30px rgba(56,189,248,.4);

  animation:pulseLogo 2s infinite;
}

/* Pulse Effect */

@keyframes pulseLogo{
  0%,100%{
    transform:translate(-50%,-50%) scale(1);
  }
  50%{
    transform:translate(-50%,-50%) scale(1.1);
  }
}
</style>
</head>


<body>

<div class="container">

<div class="card" id="card">

<!-- HEADER -->

<div class="header">

<h2>
<i class="fa-solid fa-chart-line"></i>
Live Stock Terminal
</h2>

<p>Fetch real-time stock prices using AI-powered analysis</p>

</div>


<!-- FORM -->

<form method="POST" class="form">

<div class="input-box">

<input type="text"
name="symbol"
id="stockInput"
placeholder="AAPL | TSLA | INFY.NS"
required>

</div>


<button type="submit" id="fetchBtn">
<i class="fa-solid fa-satellite-dish"></i>
Fetch Market Data
</button>

</form>


{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="msg">{{ messages[0] }}</div>
{% endif %}
{% endwith %}


<!-- FOOTER -->

<div class="footer">

<a href="/dashboard">
<i class="fa-solid fa-house"></i>
Dashboard
</a>

<a href="/logout">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>

</div>


</div>
</div>


<!-- ================= SCRIPT ================= -->

<script>

const card = document.getElementById("card");

/* Mouse glow */

card.addEventListener("mousemove",e=>{

const rect = card.getBoundingClientRect();

const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

card.style.setProperty("--x",x+"px");
card.style.setProperty("--y",y+"px");

});
/* AI LOADER */

const loader = document.getElementById("aiLoader");

document.querySelectorAll("form").forEach(form=>{

  form.addEventListener("submit",()=>{

    loader.classList.add("active");

  });

});
</script>

<!-- AI LOADER -->

<div class="ai-loader" id="aiLoader">

 <div class="ai-core">

  <div class="logo-loader">

    <div class="ring"></div>

    <img src="{{ url_for('static', filename='images/logo.png') }}" class="loader-logo">

  </div>

  <h3>AI Processing</h3>

  <p>Analyzing Market Data...</p>

</div> 

</div>
</body>
</html>
